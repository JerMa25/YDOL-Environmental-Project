services:
  db:
    image: postgres:latest
    container_name: wastetracker-db
    environment:
      POSTGRES_DB: wastetrackerdb
      POSTGRES_USER: wate_user
      POSTGRES_PASSWORD: password123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
